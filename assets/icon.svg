<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Arabic Corpus Translator">
  <title>Arabic Corpus Translator</title>
  <desc>Deep teal rounded square with the Arabic glyph “ترجمة” at center and a ring of 5 gold markers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e5263"/>
      <stop offset="1" stop-color="#0a3a47"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e8c170" stop-opacity="0.18"/>
      <stop offset="0.7" stop-color="#e8c170" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#e8c170" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="420" fill="url(#halo)"/>
  <g fill="#e8c170" aria-hidden="true">
    <circle cx="512.0" cy="132.0" r="26"/>
    <circle cx="873.4" cy="394.6" r="26"/>
    <circle cx="735.4" cy="819.4" r="26"/>
    <circle cx="288.6" cy="819.4" r="26"/>
    <circle cx="150.6" cy="394.6" r="26"/>
  </g>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#e8c170" stroke-width="3" stroke-opacity="0.35"/>
  <text x="512" y="593" font-family="'Amiri','Scheherazade New','Noto Naskh Arabic','Traditional Arabic',serif" font-size="300" font-weight="700"
        text-anchor="middle" fill="#f5efe0" direction="rtl">ترجمة</text>
  <text x="512" y="800" font-family="'SF Mono','Consolas','Roboto Mono',monospace" font-size="52" font-weight="600" letter-spacing="5"
        text-anchor="middle" fill="#e8c170" fill-opacity="0.85">5-STAGE · AR</text>
</svg>
